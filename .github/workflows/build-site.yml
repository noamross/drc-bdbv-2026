on: 
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: write
  packages: read
  actions: write

name: Publish Website

jobs:
  build-publish:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/noamross/nrenv/nrimg:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up dependencies
        id: nrdeps
        uses: noamross/nrenv/.github/actions/setup-nr-deps@main
        with:
          # Anything this repo needs beyond the renv.lock sysreqs:
          extra-apt-packages: ""
          # lockfile: renv.lock   # override if not at the repo root
          nrenv-token: ${{ secrets.NRENV_WRITE_TOKEN }}
          # Persist Quarto's freeze directory across runs. Cached to a staging
          # path so committed freeze files can take precedence after restore.
          cache-dirs: www/_freeze_cache

      - name: Merge freeze cache with committed files
        run: |
          if [ -d www/_freeze_cache ]; then
            # Committed files overwrite cached ones; cache-only files are kept
            cp -r www/_freeze/. www/_freeze_cache/
            rm -rf www/_freeze
            mv www/_freeze_cache www/_freeze
          fi

      - name: Render Quarto project
        run: |
          targets::tar_make(drc_map_site)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: gh-pages
          folder: www/_site
