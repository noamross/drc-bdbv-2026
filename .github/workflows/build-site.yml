on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # every day at midnight UTC

permissions:
  checks: write
  contents: read
  packages: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

name: Publish Website

jobs:
  build-publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/noamross/nrenv/nrimg:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up dependencies
        id: nrdeps
        uses: noamross/nrenv/.github/actions/setup-nr-deps@main
        with:
          # Anything this repo needs beyond the renv.lock sysreqs:
          extra-apt-packages: ""
          # lockfile: renv.lock   # override if not at the repo root
          nrenv-token: ${{ secrets.NRENV_WRITE_TOKEN }}
          cache-key-prefix: nr-v2

      - name: Render Quarto project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          targets::tar_make(drc_map_site)
        shell: Rscript {0}

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Remove stale Pages artifact
        # A "re-run failed jobs" re-executes this job without clearing
        # artifacts already uploaded under the same run id; a leftover
        # github-pages artifact from a prior attempt makes deploy-pages
        # error with "Multiple artifacts named github-pages were found".
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' |
          while read -r id; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: www/_site

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5
